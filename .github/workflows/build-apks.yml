name: Build Flutter APKs

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "apps/pos/**"
      - "apps/manager/**"
      - ".github/workflows/build-apks.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-pos:
    name: Build POS APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload POS APK
        uses: actions/upload-artifact@v4
        with:
          name: pos-app-debug
          path: apps/pos/build/app/outputs/flutter-apk/app-debug.apk

  build-manager:
    name: Build Manager APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/manager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: manager-app-debug
          path: apps/manager/build/app/outputs/flutter-apk/app-debug.apk
